name: Weekly update

# Retrains the model in the cloud every week and pushes the refreshed models +
# data back to the repo — which auto-triggers a Render redeploy, so the LIVE
# demo stays current without depending on any local machine being awake.

on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC (UFC events land over the weekend)
  workflow_dispatch: {}    # allow manual runs from the Actions tab

# let the built-in token push commits back to the repo
permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (OpenMP for xgboost)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # pinned serving libs first so the retrained models load on Render,
          # then the rest (xgboost, scraper deps) for the training/benchmark step
          pip install -r requirements-app.txt
          pip install -r requirements.txt

      - name: Scrape new fights, rebuild features, retrain
        run: python -m src.update

      - name: Guard — shipped models must be servable by the lean Render image
        run: |
          python - <<'PY'
          import joblib
          fin = joblib.load("models/finish_method.joblib")
          assert not fin.get("is_xgb"), (
              "finish model came out as XGBoost; the Render serving image is "
              "xgboost-free and could not load it. Skipping the deploy push so "
              "the live demo keeps serving the last good (LR) models."
          )
          print("OK: both shipped models are LR — loadable by the serving image.")
          PY

      - name: Commit & push if anything changed (triggers Render redeploy)
        run: |
          git config user.name "Rakan Tahainah"
          git config user.email "tahainahrakan@gmail.com"
          git add data/ models/
          if git diff --cached --quiet; then
            echo "No new data this week — nothing to deploy."
          else
            git commit -m "Weekly auto-update: retrain through $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed refreshed models/data — Render will redeploy."
          fi
